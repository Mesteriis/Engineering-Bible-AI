name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep shellcheck shfmt

      - name: Validate
        run: make validate
