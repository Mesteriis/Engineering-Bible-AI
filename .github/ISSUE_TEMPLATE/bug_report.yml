name: Bug report
description: Report a validation, installer, or skill packaging bug.
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the observed behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include non-secret commands and output.
      render: shell
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: List validation commands already run.
  - type: checkboxes
    id: boundary
    attributes:
      label: Runtime boundary
      options:
        - label: This report does not include secrets, auth files, `.env` values, or private runtime config.
          required: true
