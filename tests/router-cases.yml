version: 1
cases:
  - id: python-bug-fix
    prompt: "Fix failing pytest around user creation."
    expect:
      skills:
        - debugging
        - python

  - id: broad-architecture-review
    prompt: "Review this module architecture and suggest how to split it."
    expect:
      skills:
        - code-review
        - architecture-principles

  - id: large-file-refactor
    prompt: "This file is 3000 lines, refactor it safely."
    expect:
      skills:
        - refactoring
        - testing-tdd

  - id: security-sensitive-api-change
    prompt: "Add authorization checks to this endpoint."
    expect:
      skills:
        - security
        - testing-tdd

  - id: esphome-relay-automation
    prompt: "Create ESPHome config for relay and sensor fail-safe behavior."
    expect:
      skills:
        - esphome
        - esp32

  - id: todo-plan
    prompt: "Write a TODO plan for splitting this package."
    expect:
      skills:
        - architecture-principles
        - documentation

  - id: adversarial-discussion
    prompt: "Сравни 2 подхода к кэшированию (Redis vs in-memory), какой выбрать?"
    expect:
      skills:
        - core-engineering

  - id: strict-tdd-guard
    prompt: "Add this behavior but block implementation until there is a failing test."
    expect:
      skills:
        - tdd-guard

  - id: repository-context-pack
    prompt: "Собери repomix-style context pack по этому репозиторию для handoff в другой AI session."
    expect:
      skills:
        - context-pack

  - id: session-memory-delta
    prompt: "Запомни это решение для следующих сессий и обнови durable project memory."
    expect:
      skills:
        - session-memory

  - id: parallel-agent-squad
    prompt: "Разбей задачу на параллельные worktree lanes: один агент пишет фичу, второй тесты, третий ревьюит security."
    expect:
      skills:
        - agent-squad
        - subagent-result-merge

  - id: external-agent-pack
    prompt: "Проверь этот Claude Code marketplace pack и адаптируй его для Codex, если безопасно."
    expect:
      skills:
        - external-agent-pack-audit
        - supply-chain-review

  - id: karpathy-discipline
    prompt: "Не усложняй, сначала проверь предположения и не пиши лишний framework."
    expect:
      skills:
        - karpathy-guidelines

  - id: dynamic-runtime-capabilities
    prompt: "Inspect the tools exposed in this session and select the safest capability for the task."
    expect:
      skills:
        - mcp-tool-router
